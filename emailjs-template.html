<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Message — The Safer Sounds Club</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Meow+Script&display=swap');

    body {
      margin: 0;
      padding: 0;
      background-color: #f0ebe0;
      font-family: Georgia, 'Times New Roman', serif;
      color: #1a1a1a;
    }
    .wrapper {
      max-width: 600px;
      margin: 0 auto;
      background-color: #f5f0e8;
    }
    .header {
      text-align: center;
      padding: 40px 32px 0;
      border-bottom: 1.5px dashed rgba(26,26,26,0.2);
    }
    .brand {
      font-family: 'Meow Script', 'Palatino Linotype', Georgia, cursive;
      font-size: 32px;
      font-weight: 400;
      color: #1a1a1a;
      margin: 0 0 24px;
    }
    .hero-img {
      width: 180px;
      height: auto;
      opacity: 0.88;
      display: block;
      margin: 0 auto;
    }
    .body {
      padding: 36px 40px 40px;
    }
    .eyebrow {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #7a9e8a;
      margin: 0 0 12px;
    }
    .heading {
      font-family: 'Meow Script', 'Palatino Linotype', Georgia, cursive;
      font-size: 26px;
      font-weight: 400;
      color: #1a1a1a;
      margin: 0 0 28px;
      line-height: 1.3;
    }
    .field-block {
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(26,26,26,0.1);
    }
    .field-block:last-child {
      border-bottom: none;
      margin-bottom: 0;
    }
    .label {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(26,26,26,0.45);
      margin: 0 0 6px;
    }
    .value {
      font-size: 15px;
      line-height: 1.7;
      color: #1a1a1a;
      margin: 0;
    }
    .message-value {
      font-size: 15px;
      line-height: 1.8;
      color: #1a1a1a;
      margin: 0;
      white-space: pre-wrap;
    }
    .reply-btn {
      display: inline-block;
      margin-top: 32px;
      padding: 14px 40px;
      background-color: #7a9e8a;
      color: #f5f0e8 !important;
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .footer {
      text-align: center;
      padding: 24px 32px 32px;
      border-top: 1.5px dashed rgba(26,26,26,0.15);
    }
    .footer-text {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(26,26,26,0.4);
      margin: 0;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <div class="header">
      <img src="https://safersoundsclub.pages.dev/images/brand-email.png" alt="the Safer Sounds Club" width="305" style="display:block;margin:0 auto 24px;">
      <img
        class="hero-img"
        src="https://safersoundsclub.pages.dev/images/Chair.png"
        alt=""
      >
    </div>

    <div class="body">
      <p class="eyebrow">New Message</p>
      <p class="heading">someone reached out</p>

      <div class="field-block">
        <p class="label">From</p>
        <p class="value">{{from_name}}</p>
      </div>

      <div class="field-block">
        <p class="label">Email</p>
        <p class="value">{{from_email}}</p>
      </div>

      <div class="field-block">
        <p class="label">I am</p>
        <p class="value">{{role}}</p>
      </div>

      <div class="field-block">
        <p class="label">Subject</p>
        <p class="value">{{subject}}</p>
      </div>

      <div class="field-block">
        <p class="label">Message</p>
        <p class="message-value">{{message}}</p>
      </div>

      <div style="text-align:center;">
        <a href="mailto:{{reply_to}}" class="reply-btn">Reply to {{from_name}}</a>
      </div>
    </div>

    <div class="footer">
      <p class="footer-text">
        The Safer Sounds Club, LLC<br>
        Educational content — not a substitute for therapy.
      </p>
    </div>

  </div>
</body>
</html>
